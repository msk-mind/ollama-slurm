# Qwen3 Coder Next - A100 Profile
# A100: 80GB VRAM, max 4 per node
# Model: 80B total params (3B active), MoE architecture with DeltaNet hybrid attention
# File: ~48GB (UD-Q4_K_XL), KV cache: ~26GB at 128K context (note: native 256K possible)
# Total per GPU: ~74GB -> fits on 1x A100 with minimal headroom
# 2x A100 provides headroom for 256K context
MODEL_FILE="~/.cache/llama.cpp/Qwen3-Coder-Next-UD-Q4_K_XL.gguf"
CPUS=12
MEM="64G"
GPUS=2
GPU_TYPE="a100"
CONTEXT_SIZE=131072
N_GPU_LAYERS=-1
EXTRA_ARGS="-b 2048 -fa on --temp 1.0 --top-p 0.95 --top-k 40 --min-p 0.01"
