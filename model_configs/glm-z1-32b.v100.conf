# GLM-Z1 32B - V100 Profile
# V100: 16GB VRAM, max 4 per node
# Model: ~19GB split across 4 GPUs (~4.75GB/GPU)
# KV cache at 32K: ~6.5GB total (~1.6GB/GPU)
# Total per GPU: ~6.4GB -> fits on V100 16GB
# P40: model too large for single 24GB GPU without tensor parallelism
#
# CONTEXT NOTE: GLM-Z1-32B has a native 32K context window.
# Extending beyond 32K via RoPE scaling degrades reasoning quality.
# 32K is the minimum viable context for Claude CLI; use glm-z1-32b.a100
# (128K) when possible. This V100 profile is a fallback when A100s
# are unavailable, not for demanding workloads.
MODEL_FILE="~/.cache/llama.cpp/GLM-Z1-32B-0414-Q4_K_M.gguf"
CPUS=16
MEM="48G"
GPUS=4
GPU_TYPE="v100"
CONTEXT_SIZE=32768
N_GPU_LAYERS=-1
EXTRA_ARGS=""
