# GPT-OSS 20B - P40 Profile
# P40: 24GB VRAM, typically 1 GPU per node for this workflow
# Model: ~12GB (MXFP4 native)
# KV cache + buffers at 64K context: ~3GB
# Leaves practical VRAM headroom for single-GPU P40 use
# HF: ggml-org/gpt-oss-20b-GGUF
MODEL_FILE="~/.cache/llama.cpp/gpt-oss-20b-mxfp4.gguf"
CPUS=8
MEM="32G"
GPUS=1
GPU_TYPE="p40"
CONTEXT_SIZE=65536
N_GPU_LAYERS=-1
EXTRA_ARGS="-b 1024 -ub 1024 --temp 1.0 --top-p 1.0 --top-k 0 --min-p 0.0"
