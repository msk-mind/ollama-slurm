# Qwen3 Next 80B Thinking - A100 Profile
# A100: 80GB VRAM, max 4 per node
# Same weights/size as Instruct variant: ~47GB Q4_K_XL split across 4 GPUs (11.75GB/GPU)
# KV cache at 128K: ~52GB total (13GB/GPU) -> total per GPU: ~24.75GB
# Thinking variant emits <think>...</think> reasoning traces by default.
# Use lower temperature and larger output budget for quality reasoning.
MODEL_FILE="~/.cache/llama.cpp/Qwen3-Next-80B-A3B-Thinking-UD-Q4_K_XL.gguf"
CPUS=16
MEM="96G"
GPUS=4
GPU_TYPE="a100"
CONTEXT_SIZE=131072
N_GPU_LAYERS=-1
EXTRA_ARGS="--temp 0.6 --top-p 0.95 --top-k 20"
