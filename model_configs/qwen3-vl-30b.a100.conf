# Qwen3 VL 30B - A100 Profile (Vision Model)
# A100: 80GB VRAM, max 4 per node
# Model: ~19GB (Q4_K_M) + mmproj, KV cache: ~6GB at 32K context
# Total VRAM: ~25GB -> fits on 1x A100 with headroom
# Vision support via --mmproj for multimodal (image) inputs
# Note: Vision only works via OpenAI /v1/chat/completions (Codex), not Anthropic /v1/messages (Claude Code)
# HF: Qwen/Qwen3-VL-30B-A3B-Instruct-GGUF:Q4_K_M
# mmproj download: huggingface-cli download Qwen/Qwen3-VL-30B-A3B-Instruct-GGUF mmproj-Qwen3VL-30B-A3B-Instruct-F16.gguf --local-dir ~/.cache/llama.cpp
MODEL_FILE="~/.cache/llama.cpp/Qwen3VL-30B-A3B-Instruct-Q4_K_M.gguf"
CPUS=8
MEM="32G"
GPUS=1
GPU_TYPE="a100"
CONTEXT_SIZE=32768
N_GPU_LAYERS=-1
EXTRA_ARGS="-b 2048 -ub 2048 --mmproj ~/.cache/llama.cpp/mmproj-Qwen3VL-30B-A3B-Instruct-F16.gguf"
