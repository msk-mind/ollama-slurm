# Model: ~12GB (MXFP4 native), KV cache + buffers: ~6GB at 128K context
# Total VRAM: ~18GB -> fits on 1x A100 with headroom
# HF: ggml-org/gpt-oss-20b-GGUF
MODEL_FILE="~/.cache/llama.cpp/gpt-oss-20b-mxfp4.gguf"
CPUS=8
MEM="32G"
GPUS=1
GPU_TYPE="a100"
CONTEXT_SIZE=131072
N_GPU_LAYERS=-1
EXTRA_ARGS="-b 2048 -ub 2048 --temp 1.0 --top-p 1.0 --top-k 0 --min-p 0.0"
